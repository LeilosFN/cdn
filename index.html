<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Leilos</title>
    <link rel="stylesheet" href="public/media/css/style.css">
    <link rel="icon" type="image/x-icon" href="public/media/images/logo/logo.ico">
    <!-- Fuente para el estilo del logo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
    <img src="public/media/images/logo/logo.jpg" alt="Leilos Logo" class="logo">
    <main>
        <h1 id="title">Access Denied</h1>
        <p id="subtitle">This property belongs to Leilos.</p>
        <p id="message">You do not have permission to view this resource.</p>
    </main>
    <footer>
        <p>&copy; 2026 Leilos</p>
    </footer>

    <script>
        // Traducciones / Translations
        const translations = {
            es: {
                pageTitle: "Acceso Denegado - Leilos",
                title: "Acceso Denegado",
                subtitle: "Esta propiedad pertenece a Leilos.",
                message: "No tienes permiso para ver este recurso."
            },
            en: {
                pageTitle: "Access Denied - Leilos",
                title: "Access Denied",
                subtitle: "This property belongs to Leilos.",
                message: "You do not have permission to view this resource."
            }
        };

        // Detectar idioma / Detect language
        // Si empieza por 'es' (es-ES, es-MX, etc.) usa español, si no, inglés.
        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang.startsWith('es') ? 'es' : 'en';

        // Aplicar textos / Apply texts
        document.title = translations[lang].pageTitle;
        document.documentElement.lang = lang;
        document.getElementById('title').textContent = translations[lang].title;
        document.getElementById('subtitle').textContent = translations[lang].subtitle;
        document.getElementById('message').textContent = translations[lang].message;
    </script>
</body>
</html>
